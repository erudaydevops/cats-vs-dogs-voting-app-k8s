# HorizontalPodAutoscaler — auto-scales backend pods
# When CPU > 70%: scale up | When CPU < 70%: scale down
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: worktrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2      # Always keep minimum 2 pods
  maxReplicas: 5      # Scale up to maximum 5 pods
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale when CPU > 70%
