# Secret stores sensitive data as base64 encoded values
# echo -n "postgres" | base64  →  cG9zdGdyZXM=
# echo -n "worktrack" | base64 →  d29ya3RyYWNr
apiVersion: v1
kind: Secret
metadata:
  name: worktrack-secret
  namespace: worktrack
type: Opaque
data:
  DB_PASSWORD: cG9zdGdyZXM=   # "postgres"
  DB_NAME:     d29ya3RyYWNr   # "worktrack"
