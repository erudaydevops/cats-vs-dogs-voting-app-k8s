# PersistentVolumeClaim — requests storage for PostgreSQL
# Without this, data is lost when pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: worktrack
spec:
  accessModes:
    - ReadWriteOnce        # One pod can read/write at a time
  resources:
    requests:
      storage: 1Gi         # Request 1GB of storage
